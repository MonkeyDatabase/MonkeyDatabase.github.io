- name: SportsDownload
  descr: "为同学开发的小工具，具有搜集素材，视频容器封装，视频转码等功能。"

- name: Multiplayer Online Shooting Game
  descr: "在PUBG爆火的背景下，与同学一起基于Unity引擎开发的类吃鸡类游戏。"

- name: The Lost of Bow
  descr: "在中国传统文化逐渐失传的文化背景下，设计并实现以弘扬中国传统文化中礼射文化为目的的虚拟现实体验项目。"

- name: Design of Skybox Model for Data Visualization in Virtual Environment
  descr: "本课题基于虚拟现实，设计并实现一种内视域的沉浸式数据可视化模型，有别于用户围绕数据可视化视图的观察方式，该模型类似于天空盒，将数据可视化视图置于用户的周围。 "

- name: Account Book
  descr: "《UNIX操作系统及应用》校任选课结课大作业之一，要求独立设计并实现一个Shell脚本软件，本软件包含记账、查账、报表等功能"

- name: 多人聊天程序
  descr: "《Java高级语言程序设计》校任选课的结课大作业，包括添加好友、好友聊天、个人信息等功能"

- name: 影院票务管理系统
  descr: "《数据库技术与应用》选修课的结课大作业，基于Access进行实现的管理系统，包括用户注册、用户登陆、权限设置、网上购票选座、现场购票选座、查看订单详情、取消订单、业务报表等功能。"

- name: 简化图像边缘
  descr: "《计算机视觉算法及实践》校任选课的三个作业之一，基于传统方法简化边缘。其余两个作业分别为基于大气传播模型的图像去雾、基于图像的血缘关系判断，由于相关的基础知识比较匮乏且当时课业压力比较大，后两个作业虽然做出来了，但是置信度不高"

- name: 鼠标人机工程学改进设计
  descr: "《人机工程》专业必修课结课大作业，基于肌电测试等实验数据，分析手部及腕部的受力，在采集被测的手部数据后，设计并制作人机工程鼠标的实体模型"

- name: 儿童游戏社区VI形象设计
  descr: "《VI形象设计》必修课结课大作业，要求任选一个企业，并为其设计一套VI形象，包括Logo、Slogan、MI、BI、文件纸张、文件袋、信封、工作服、车辆、旗帜等相关形象设计。"

- name: 关于社区系统的适老化设计
  descr: "在城市高速发展的今天，老年人时常由于身体问题而遇到各种问题，如下楼困难、容易受伤、容易走失等。本课题旨在设计一套对社区道路、楼梯、照明等系统的适老化设计。"

